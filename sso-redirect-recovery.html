                <h1 class="status-heading">You're now signed in.</h1>
                <p class="status-instructions">If you're not taken to your page automatically in 5 seconds, select an

            <!-- Navigation Links -->
            <nav class="nav-section" aria-label="Quick navigation">
                <div class="nav-links">
                    <a href="#" id="agency-link" class="nav-link hidden">[Agency] intranet</a>
                    <a href="https://ntgcentral.nt.gov.au" id="ntg-central-link" class="nav-link">NTG Central</a>
                </div>
            </nav>

            <!-- Countdown Indicator -->
            <div class="countdown-section" id="countdown-section" aria-live="polite" aria-atomic="true">
                <div class="spinner" role="status" aria-label="Loading"></div>
                <span class="countdown-text" id="countdown-text">Redirecting to your page in 5s...</span>
            </div>

            <!-- No JavaScript Fallback -->
            <noscript>
                <div class="no-js-message">
                    <strong>Please select an option above to continue.</strong>
                </div>
            </noscript>
            <div class="no-js-message" id="no-js-fallback">
